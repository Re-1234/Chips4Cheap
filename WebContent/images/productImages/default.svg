<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Sfondo grigio chiaro -->
  <rect width="400" height="300" fill="#f8f9fa"/>
  <!-- Bordo grigio -->
  <rect width="400" height="300" fill="none" stroke="#dee2e6" stroke-width="4"/>
  
  <!-- Icona Immagine -->
  <g fill="#adb5bd" transform="translate(150, 80)">
    <rect width="100" height="80" rx="8" fill="none" stroke="#adb5bd" stroke-width="6"/>
    <circle cx="30" cy="30" r="12"/>
    <path d="M 10 75 L 40 40 L 70 65 L 85 50 L 95 65" fill="none" stroke="#adb5bd" stroke-width="6" stroke-linejoin="round"/>
  </g>
  
  <!-- Testo -->
  <text x="50%" y="220" font-family="Arial, sans-serif" font-size="18" fill="#6c757d" text-anchor="middle" font-weight="bold">
    Nessuna Immagine
  </text>
  <text x="50%" y="245" font-family="Arial, sans-serif" font-size="14" fill="#adb5bd" text-anchor="middle">
    Il prodotto non ha ancora una foto
  </text>
</svg>
